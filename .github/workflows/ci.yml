name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: corepack enable && corepack prepare npm@11.7.0 --activate
      - run: npm --version
      - run: npm ci
      - run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: false
      - run: npx turbo run typecheck --filter=!mobile
      - run: npx turbo run test --filter=!mobile

  deploy-api:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: corepack enable && corepack prepare npm@11.7.0 --activate
      - run: npm ci
      - name: Apply DB Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'packages/api'
          command: d1 migrations apply DB --remote
      # Requires CLOUDFLARE_API_TOKEN with Workers Scripts:Edit + Zone Workers Routes:Edit
      # for slichti.org (wrangler.toml routes). See docs/deploy-cloudflare.md if deploy fails
      # after "Uploaded studio-platform-api" with authentication error 10000.
      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'packages/api'

  deploy-web:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: corepack enable && corepack prepare npm@11.7.0 --activate
      - run: npm ci
      - run: npm run build --workspace=apps/web
      - name: Deploy Web (Pages)
        run: |
          for i in 1 2 3; do
            npx wrangler pages deploy build/client --project-name studio-platform-web --branch main --commit-dirty=true && exit 0
            echo "Deploy attempt $i failed (often 504/503 from Cloudflare API). Retrying in 30s..."
            sleep 30
          done
          exit 1
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
